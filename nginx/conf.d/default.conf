server {
    listen 80 default_server;
    server_name _;

    # ---- Our own landing page ----
    # nginx serves this static HTML directly. gophish never sees the GET,
    # so the page renders even though the phish server is not public.
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ---- Credential submission ----
    # The form POSTs here. nginx proxies the request (carrying the rid and
    # the submitted fields) to gophish's phish server, which records the
    # "Submitted Data" event and stores the capture in its DB.
    location = /login {
        proxy_pass http://gophish:8080;   # no URI -> forward the path as-is
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Click registration ----
    # The static page fires a background GET here carrying the rid. gophish's
    # landing-page handler sees a GET and records the "Clicked Link" event.
    # We only want that side effect; the response body (gophish's own landing
    # HTML) is discarded by the page's fetch() call.
    location = /click {
        proxy_pass http://gophish:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Optional: gophish tracking pixel / assets (records "Email Opened") ----
    location /track {
        proxy_pass http://gophish:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
