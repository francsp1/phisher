server {
    listen 80 default_server;
    server_name _;

    # ---- Our own landing page ----
    # nginx serves this static HTML directly. gophish never sees the GET,
    # so the page renders even though the phish server is not public.
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ---- Credential submission ----
    # The form POSTs here. nginx proxies the request (carrying the rid and
    # the submitted fields) to gophish's phish server, which records the
    # "Submitted Data" event and stores the capture in its DB.
    location = /login {
        proxy_pass http://gophish:8080/login;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Optional: let gophish serve its tracking pixel / assets ----
    # Handy if you later embed gophish's open/click tracker in the page.
    location /track {
        proxy_pass http://gophish:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
